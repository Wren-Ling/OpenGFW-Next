- name: vpn-wireguard
  log: true
  severity: high
  expr: wireguard.message_type != nil

- name: vpn-openvpn
  log: true
  severity: high
  expr: openvpn.rx_pkt_cnt != nil || openvpn.tx_pkt_cnt != nil

- name: proxy-trojan-heuristic
  log: true
  severity: high
  expr: trojan.yes == true

- name: proxy-fully-encrypted-tcp
  log: true
  severity: high
  expr: fet.yes == true

- name: proxy-socks
  log: true
  severity: medium
  expr: socks.version != nil

